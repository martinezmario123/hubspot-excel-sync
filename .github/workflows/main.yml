name: Sincronizar HubSpot desde CSV manual

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Para el botón manual
  schedule:
    - cron: '0 * * * *' # Cada hora

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install pandas openpyxl requests python-dotenv

      # HEMOS QUITADO EL PASO 1 (EXPORTAR) PARA QUE NO BORRE TU EXCEL
      
      - name: Paso 2 - Actualizar Proyectos desde CSV
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HS_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: python update_projects.py

      # HEMOS QUITADO EL PASO DE GUARDAR EN GITHUB PARA QUE NO SOBREESCRIBA NADA
