name: Sincronizar HubSpot a Google Sheets CSV

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite darle al botón "Run" manualmente
  schedule:
    - cron: '0 * * * *' # Se ejecuta automáticamente cada hora

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install pandas openpyxl requests python-dotenv

      - name: Paso 1 - Exportar Clientes a CSV
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HS_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }} # Por si usas nombres distintos
        run: python export_customers.py

      - name: Paso 2 - Actualizar Proyectos desde CSV
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HS_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: python update_projects.py

      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name 'HubSpot Bot'
          git config --global user.email 'bot@hubspot.com'
          git add clientes_hubspot.csv
          git commit -m "Actualización automática y sincronización de proyectos" || echo "Sin cambios"
          git push
