name: Sync Excel to HubSpot

on:
  push:
    paths:
      - 'datos.xlsx'
  workflow_dispatch:  # <--- Esto activa el botón de ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 3. Instalar librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Ejecutar sincronización a HubSpot
      env:
        HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      run: python sync.py
