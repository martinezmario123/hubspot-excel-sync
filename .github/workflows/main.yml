name: Sincronizar HubSpot a Google Sheets CSV

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite darle al botón "Run" manualmente
  schedule:
    - cron: '0 * * * *' # Se ejecuta automáticamente cada hora (minuto 0)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install pandas openpyxl requests

      - name: Ejecutar exportación a CSV
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: python export_customers.py

      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name 'HubSpot Bot'
          git config --global user.email 'bot@hubspot.com'
          # Añadimos el CSV y eliminamos el XLSX viejo si existiera para no liar
          git add clientes_hubspot.csv
          git commit -m "Actualización automática CSV para Google Sheets" || echo "Sin cambios"
          git push
