name: Sincronizar HubSpot a Excel

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Esto te permite darle al botón "Run" manualmente
  schedule:
    - cron: '0 * * * *' # Esto hará que se ejecute SOLO cada hora automáticamente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v2

      - name: Configurar Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install pandas openpyxl requests

      - name: Ejecutar exportación
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: python export_customers.py

      - name: Guardar el Excel en el repositorio
        run: |
          git config --global user.name 'HubSpot Bot'
          git config --global user.email 'bot@hubspot.com'
          git add clientes_hubspot.xlsx
          git commit -m "Actualización automática de clientes desde HubSpot" || echo "Sin cambios"
          git push
