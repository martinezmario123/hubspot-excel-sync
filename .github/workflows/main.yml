name: Sincronización Automática HubSpot

on:
  schedule:
    # Esto lo ejecuta de lunes a viernes a las 09:00 AM (hora UTC)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Esto te permite darle a un botón de "Play" manual en GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install pandas requests python-dotenv

      - name: Ejecutar Sincronización
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: python update_projects.py
