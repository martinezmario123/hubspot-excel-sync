name: Sincronización cada 30 min HubSpot

on:
  schedule:
    # Este 'cron' le dice a GitHub: "Ejecuta cada 30 minutos"
    - cron: '*/30 * * * *'
  workflow_dispatch: # Esto te deja dar al botón de "Play" manual cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install pandas requests python-dotenv

      - name: Ejecutar Sincronización
        env:
          # IMPORTANTE: Asegúrate de tener este 'Secret' creado en GitHub
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        run: python update_projects.py
